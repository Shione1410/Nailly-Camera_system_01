<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nailly v2.1 - Debug Boot</title>
    <style>
        body { margin: 0; background: #121212; color: #00ffff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
        #status-box { background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #00ffff; border-radius: 8px; width: 80%; max-width: 400px; }
        .log-line { font-size: 12px; margin: 5px 0; }
        #start-btn { 
            margin-top: 20px; padding: 15px 30px; font-size: 16px; font-weight: bold;
            background: #333; color: #666; border: none; border-radius: 50px; cursor: not-allowed;
        }
        #start-btn.ready { background: #00ffff; color: #000; cursor: pointer; box-shadow: 0 0 20px #00ffff; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="status-box">
        <div class="log-line">1. Network: <span id="log-net">Connecting...</span></div>
        <div class="log-line">2. Library: <span id="log-lib">Loading...</span></div>
        <div class="log-line">3. Engine: <span id="log-eng">Initializing...</span></div>
    </div>

    <button id="start-btn" disabled>Core Loading...</button>
    <video id="videoInput" playsinline></video>

    <script>
        // 読み込み完了フラグ
        var cvReady = false;

        // OpenCVの読み込み完了時に呼ばれるグローバル関数
        var Module = {
            onRuntimeInitialized: function() {
                console.log("OpenCV Runtime Initialized");
                document.getElementById('log-eng').innerText = "READY";
                document.getElementById('log-eng').style.color = "#00ff00";
                cvReady = true;
                enableButton();
            }
        };

        function enableButton() {
            const btn = document.getElementById('start-btn');
            btn.innerText = "Nailly 起動";
            btn.classList.add('ready');
            btn.disabled = false;
        }

        // タイムアウト監視（30秒経ってもダメなら警告）
        setTimeout(() => {
            if (!cvReady) {
                document.getElementById('log-lib').innerText = "TIMEOUT (Retry recommended)";
                document.getElementById('log-lib').style.color = "#ff4444";
            }
        }, 30000);
    </script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.5.4/opencv.js" 
            onload="document.getElementById('log-lib').innerText='DOWNLOADED'; document.getElementById('log-lib').style.color='#00ff00';"
            onerror="document.getElementById('log-lib').innerText='FAILED';"></script>

    <script>
        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('status-box').style.display = 'none';
            document.getElementById('start-btn').style.display = 'none';
            const video = document.getElementById('videoInput');
            video.style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.play();
        };
    </script>
</body>
</html>
