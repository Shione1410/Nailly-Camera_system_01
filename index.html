<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nailly v2.0 - OpenCV Learning Engine</title>
    <style>
        :root { --accent: #00ffff; --bg: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Consolas', monospace; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        #overlay { position: absolute; z-index: 10; padding: 20px; background: rgba(0,0,0,0.6); pointer-events: none; }
        #status-bar { border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
        
        /* 起動ボタン */
        #boot-screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
        #start-btn { 
            padding: 20px 40px; font-size: 1.2rem; background: #333; color: #666; 
            border: 2px solid #444; border-radius: 10px; cursor: not-allowed;
        }
        #start-btn.active { background: transparent; color: var(--accent); border-color: var(--accent); cursor: pointer; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div id="boot-screen">
        <button id="start-btn" disabled>OpenCV 読み込み中...</button>
    </div>

    <div id="container">
        <div id="overlay">
            <div id="status-bar">
                <strong>[ Nailly Core v2.0 ]</strong><br>
                Engine: <span id="st-cv">Wait...</span><br>
                Cam: <span id="st-cam">Wait...</span><br>
                PPM: <span id="st-ppm">0.00</span>
            </div>
            <small>1円玉（20mm）をカメラに映してください</small>
        </div>

        <video id="videoInput" playsinline></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>

    <script>
        // --- 変数定義 ---
        const video = document.getElementById('videoInput');
        const canvas = document.getElementById('canvasOutput');
        const startBtn = document.getElementById('start-btn');
        const stCv = document.getElementById('st-cv');
        const stPpm = document.getElementById('st-ppm');

        // --- 1. OpenCV 読み込み監視 ---
        // ライブラリが巨大なため、cv.Matなどの定義が完了するまでループで待ちます。
        function onOpenCvReady() {
            if (typeof cv !== 'undefined' && cv.Mat) {
                stCv.innerText = "READY";
                stCv.style.color = "#00ff00";
                startBtn.innerText = "Nailly システム起動";
                startBtn.classList.add('active');
                startBtn.disabled = false;
            } else {
                setTimeout(onOpenCvReady, 500);
            }
        }
        onOpenCvReady();

        // --- 2. カメラ起動シーケンス ---
        async function boot() {
            try {
                document.getElementById('boot-screen').style.display = 'none';
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280 } 
                });
                video.srcObject = stream;
                await video.play();
                processFrame(); // 解析ループ開始
            } catch (err) {
                alert("カメラ接続に失敗しました: " + err.message);
            }
        }
        startBtn.addEventListener('click', boot);

        // --- 3. OpenCV 画像解析メインロジック ---
        function processFrame() {
            // 画像処理用のメモリ領域（Mat）を確保
            let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let gray = new cv.Mat();
            let cap = new cv.VideoCapture(video);

            function loop() {
                try {
                    cap.read(src); // 1. ビデオから1フレーム読み込み
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY); // 2. グレースケール化（解析を高速化）
                    cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 1.5); // 3. ぼかし（ノイズ削減）

                    // 4. HoughCircles: 円（1円玉）の検出
                    let circles = new cv.Mat();
                    cv.HoughCircles(
                        gray, circles, cv.HOUGH_GRADIENT, 
                        1,      // 解像度の比率
                        60,     // 円同士の最小距離
                        75,     // Edge検出の閾値
                        40,     // 円判定の閾値（低いほど多く拾う）
                        30, 150 // 最小・最大の半径
                    );

                    // 5. 検出結果の描画とデータ計算
                    if (circles.cols > 0) {
                        let x = circles.data32F[0];
                        let y = circles.data32F[1];
                        let r = circles.data32F[2];

                        // 1mmあたりのピクセル数（PPM）を算出
                        const ppm = (r * 2) / 20; // 1円玉は直径20mm
                        stPpm.innerText = ppm.toFixed(2);

                        // 画面上に認識結果を描画（DNAプロジェクト用のデバッグ）
                        cv.circle(src, new cv.Point(x, y), r, [0, 255, 255, 255], 3);
                        cv.circle(src, new cv.Point(x, y), 2, [255, 0, 0, 255], 3);
                    }

                    // 6. 最終結果をキャンバスに表示
                    cv.imshow('canvasOutput', src);

                    // メモリ解放（JavaScriptのGCに頼らず明示的に消去）
                    circles.delete();
                    requestAnimationFrame(loop);
                } catch (e) {
                    console.error("解析エラー:", e);
                }
            }
            loop();
        }
    </script>
</body>
</html>
