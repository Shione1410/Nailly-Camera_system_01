<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nailly - Final Boot</title>
    <style>
        body { margin: 0; background: #121212; color: #00ffff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #log { position: absolute; top: 20px; left: 20px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 10px; z-index: 100; border-left: 2px solid #00ffff; }
        #start-btn { 
            padding: 20px 40px; font-size: 1.2rem; font-weight: bold;
            background: #444; color: #888; border: none; border-radius: 50px;
            cursor: not-allowed; transition: 0.3s; z-index: 1000;
        }
        #start-btn.ready { background: #00ffff; color: #000; cursor: pointer; box-shadow: 0 0 20px #00ffff; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        .magic-ring { border: 3px solid #00ffff; border-radius: 50%; position: absolute; pointer-events: none; display: none; z-index: 500; box-shadow: 0 0 15px #00ffff; }
    </style>
</head>
<body>

    <div id="log">
        Nailly System Status:<br>
        - JS: <span id="js-status">OK</span><br>
        - OpenCV: <span id="cv-status">Loading...</span><br>
        - Camera: <span id="cam-status">Wait</span>
    </div>

    <button id="start-btn">Waiting for Core...</button>

    <video id="videoInput" playsinline></video>
    <canvas id="canvasOutput"></canvas>
    <div id="targetRing" class="magic-ring"></div>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <script>
        const startBtn = document.getElementById('start-btn');
        const cvStatus = document.getElementById('cv-status');
        const camStatus = document.getElementById('cam-status');
        const video = document.getElementById('videoInput');
        const targetRing = document.getElementById('targetRing');

        // 1. OpenCVのロード確認
        function checkOpenCv() {
            if (typeof cv !== 'undefined' && cv.Mat) {
                cvStatus.innerText = "READY";
                cvStatus.style.color = "#00ff00";
                startBtn.innerText = "Start Nailly";
                startBtn.classList.add('ready');
                startBtn.disabled = false;
            } else {
                setTimeout(checkOpenCv, 500);
            }
        }

        // 2. 起動処理
        async function boot() {
            try {
                startBtn.style.display = 'none';
                camStatus.innerText = "Requesting...";
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                await video.play();
                
                camStatus.innerText = "ONLINE";
                video.style.display = "block";
                
                runAnalysis();
            } catch (err) {
                alert("Camera Error: " + err.message);
            }
        }

        // 3. 解析ループ
        function runAnalysis() {
            let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let gray = new cv.Mat();
            let cap = new cv.VideoCapture(video);

            function step() {
                try {
                    cap.read(src);
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 1.5);

                    let circles = new cv.Mat();
                    cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, 1, 50, 80, 40, 30, 150);

                    if (circles.cols > 0) {
                        let x = circles.data32F[0];
                        let y = circles.data32F[1];
                        let r = circles.data32F[2];
                        const scale = window.innerWidth / video.videoWidth;
                        targetRing.style.display = 'block';
                        targetRing.style.width = (r * 2 * scale) + 'px';
                        targetRing.style.height = (r * 2 * scale) + 'px';
                        targetRing.style.left = (x - r) * scale + 'px';
                        targetRing.style.top = (y - r) * scale + 'px';
                    } else {
                        targetRing.style.display = 'none';
                    }
                    circles.delete();
                    requestAnimationFrame(step);
                } catch (e) {
                    console.log(e);
                }
            }
            step();
        }

        startBtn.disabled = true;
        startBtn.onclick = boot;
        checkOpenCv();
    </script>
</body>
</html>
